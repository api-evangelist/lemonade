apis:
  - aid: lemonade:lemonade-insurance-api
    name: Lemonade Insurance API
    description: >-
      A quick and easy way for partners to offer Lemonade homeowners, condo,
      and renters insurance to their users. Supports quoting, policy creation,
      and payment, either through the Maya bot drop-in or via direct flow
      control. Public OpenAPI is not currently published; documentation is
      available behind the Lemonade developer portal.
    humanURL: https://www.lemonade.com/api
