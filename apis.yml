aid: lemonade
name: Lemonade
description: >-
  Lemonade, Inc. is an American insurance company. The company offers renters,
  homeowners, car, pet, and term life insurance in the United States, as well as
  contents and liability policies in Germany and the Netherlands and renters
  insurance in France. The Lemonade Insurance API allows partners to embed
  insurance quoting, policy creation, and payment flows for homeowners, condo,
  and renters policies into their own websites and apps.
type: Contract
